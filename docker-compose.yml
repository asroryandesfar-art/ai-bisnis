# BotNesia Intelligence Platform — orkestrasi produksi
#
#   docker compose up -d --build
#
# Service:
#   postgres        — PostgreSQL 16 + ekstensi pgvector (single source of truth)
#   redis           — broker Celery + cache agregasi dashboard
#   agent_api       — FastAPI multi-agent (port 8001) + endpoint /intel/*
#   celery-worker   — eksekusi task async ringan (persist embedding, sinyal FAQ/Sales)
#   celery-beat     — penjadwal job malam (Auto Learning, lihat NIGHTLY_JOB_HOUR)
#
# Catatan skala: tambah `--concurrency` / replika celery-worker saat volume
# percakapan tumbuh; agent_api bisa di-scale horizontal di belakang load balancer
# karena semua state ada di Postgres/Redis (stateless app layer).

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: botnesia
      POSTGRES_USER: ${POSTGRES_USER:-botnesia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botnesia}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./intelligence/schema_intelligence.sql:/docker-entrypoint-initdb.d/02_schema_intelligence.sql:ro
      - ./bn_platform/schema_platform.sql:/docker-entrypoint-initdb.d/03_schema_platform.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botnesia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── main.py — customer-facing API (auth, bots, chat, Phase 2 platform) ──
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-botnesia}:${POSTGRES_PASSWORD:-botnesia}@postgres:5432/botnesia
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5

  agent_api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-botnesia}:${POSTGRES_PASSWORD:-botnesia}@postgres:5432/botnesia
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: ["uvicorn", "agent_api:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]

  celery-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-botnesia}:${POSTGRES_PASSWORD:-botnesia}@postgres:5432/botnesia
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "worker", "-l", "info", "-Q", "intelligence", "--concurrency=4"]

  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-botnesia}:${POSTGRES_PASSWORD:-botnesia}@postgres:5432/botnesia
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app", "beat", "-l", "info"]

  # ── Observability: Prometheus + Grafana ──────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./bn_platform/prometheus.yml.example:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on: [api]

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
